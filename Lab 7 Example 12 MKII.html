<html>
<head>
<meta charset="utf-8" />
<title>Mapbox Example 12- Denver Tree</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
<style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoia29rb3NreWJvaSIsImEiOiJjbWx6anp4M3MwOGJzM2ZvazExMDB1N3dyIn0.70bpQh_V6GAQhoTacUuNDg';
        var map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/kokoskyboi/cmnnubp5l001e01rf7lmx5d53',
            center: [-104.951046, 39.732470],
            zoom: 12
        });
        map.on('load', function() {
            map.addLayer({
                'id':'denver_tree_point',
                'type':'circle',
                'source':{
                    type:'vector',
                    url:'mapbox://junzhimager.bh6jbmgj'
                },
                'source-layer':'denver_tree_top_10_genus-48xeds',
                'layout':{
                    'visibility': 'visible'
                },
                'paint': {
                    'circle-color':'#86b049',
                    'circle-opacity':1,
                    'circle-stroke-width':0.5,
                    'circle-stroke-color':'white',
                    'circle-stroke-opacity':0.5,
                    'circle-radius':2
                }
            });
        })
</script>
</body>
</html>
